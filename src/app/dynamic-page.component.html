<main class="dynamic-page-wrapper" *ngIf="isPageLoading; else pageContent">
  <section class="loader-card" aria-live="polite" aria-busy="true">
    <div class="loader-spinner"></div>
    <p>Content is loading from Firebase...</p>
  </section>
</main>

<ng-template #pageContent>
  <main class="dynamic-page-wrapper" *ngIf="page; else pageNotFound">
    <article class="dynamic-page">
      <style *ngIf="currentCustomCss" [textContent]="currentCustomCss"></style>

      <header class="dynamic-page__hero">
        <div class="dynamic-page__image-wrapper" *ngIf="page.heroImageUrl">
          <div class="image-skeleton" *ngIf="isHeroImageLoading" aria-hidden="true">
            <span class="visually-hidden">Loading image...</span>
          </div>
          <img
            class="dynamic-page__hero-image"
            [class.dynamic-page__hero-image--hidden]="isHeroImageLoading"
            [src]="page.heroImageUrl"
            [alt]="page.title"
            decoding="async"
            (load)="onHeroImageLoaded()"
            (error)="onHeroImageLoaded()"
          />
        </div>
        <h1>{{ page.title }}</h1>
      </header>

      <section class="dynamic-page__description">
        <p>{{ page.description }}</p>
      </section>

      <section *ngIf="safeBodyHtml" class="dynamic-page__body" [innerHTML]="safeBodyHtml"></section>
    </article>
  </main>
</ng-template>

<ng-template #pageNotFound>
  <main class="dynamic-page-wrapper">
    <article class="dynamic-page">
      <h1>Seite nicht gefunden</h1>
      <p>Für diese URL wurde noch kein Inhalt veröffentlicht.</p>
      <a routerLink="/">Zurück zur Startseite</a>
    </article>
  </main>
</ng-template>
