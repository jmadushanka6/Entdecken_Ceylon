<section class="admin-page">
  <h1>Create Content Page</h1>

  <form [formGroup]="pageForm" (ngSubmit)="submit()" novalidate>
    <label>
      URI
      <input type="text" formControlName="uri" placeholder="best-sri-lanka-route" />
    </label>
    <p class="error" *ngIf="pageForm.controls.uri.touched && pageForm.controls.uri.errors?.['required']">
      URI is required.
    </p>
    <p class="error" *ngIf="pageForm.controls.uri.touched && pageForm.controls.uri.errors?.['pattern']">
      URI must be lowercase kebab-case (letters, numbers, and dashes only).
    </p>
    <p class="error" *ngIf="pageForm.controls.uri.touched && pageForm.controls.uri.errors?.['uriTaken']">
      This URI is already in use.
    </p>

    <label>
      Title
      <input type="text" formControlName="title" />
    </label>
    <p class="error" *ngIf="pageForm.controls.title.touched && pageForm.controls.title.errors?.['required']">
      Title is required.
    </p>

    <label>
      Description
      <textarea rows="3" formControlName="description"></textarea>
    </label>
    <p class="error" *ngIf="pageForm.controls.description.touched && pageForm.controls.description.errors?.['required']">
      Description is required.
    </p>

    <label>
      Hero Image URL
      <input type="url" formControlName="heroImageUrl" placeholder="https://..." />
    </label>

    <label>
      Custom CSS
      <textarea rows="6" formControlName="customCss" placeholder=".hero { color: #333; }"></textarea>
    </label>

    <label>
      Body HTML (optional)
      <textarea rows="8" formControlName="bodyHtml" placeholder="<h2>Welcome</h2><p>...</p>"></textarea>
    </label>

    <button type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Saving...' : 'Save page' }}
    </button>
  </form>

  <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <section class="preview">
    <h2>Preview Payload</h2>
    <pre>{{ previewPayload | json }}</pre>
  </section>
</section>
